name: CI

on: [push, pull_request]

permissions:
  contents: read

# Cancel superseded runs on the same ref (avoids piling up duplicate runs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned to full commit SHAs (not moving tags); the
# trailing comment records the human-readable version. Dependabot
# (github-actions ecosystem) proposes SHA bumps.
jobs:
  # Lint is pure-Python; run it on Ubuntu (fast). node24-runtime actions.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd      # v5 (node24)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6 (node24)
        with:
          python-version: "3.13"
      - run: pip install ruff
      # Run the project's real linter (configured in pyproject.toml). Baseline
      # is clean, so this must pass.
      - name: Ruff lint
        run: ruff check .

  # Type-check is informational only: the codebase is not yet fully typed, so
  # mypy is run for visibility (errors appear in the job log) but never fails
  # the build (`|| true`) - it surfaces type issues without gating merges.
  typecheck:
    name: Type check (mypy, informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd      # v5 (node24)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6 (node24)
        with:
          python-version: "3.13"
      - run: pip install mypy
      - name: Mypy (non-blocking)
        run: mypy src/ || true

  # Build the distribution and validate its metadata on every push/PR, so a
  # packaging break (bad pyproject, missing file, bad metadata) is caught here
  # rather than only when a Release fires the publish workflow.
  build:
    name: Build & check package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd      # v5 (node24)
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6 (node24)
        with:
          python-version: "3.13"
      - name: Build sdist + wheel and check metadata
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*

  # Tests run inside an Alpine (musl) container - the SAME libc Home Assistant
  # OS / Container uses - so the native deps (aiortc / av / pylibsrtp, all via
  # musllinux wheels) install and run exactly as they do on a real HA host.
  # Alpine container jobs REQUIRE node24-runtime actions (checkout@v5+): GitHub's
  # node20 binary is glibc-only and cannot execute inside a musl container.
  test:
    name: Unit tests (Alpine / musl - HA runtime)
    runs-on: ubuntu-latest
    container: python:3.13-alpine
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd      # v5 (node24, mandatory in a musl container)
      # git for checkout; small build toolchain as a safety net for any
      # transitive dep that lacks a musllinux wheel (the heavy ones all have them).
      - name: System deps
        run: apk add --no-cache git gcc musl-dev libffi-dev
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[webrtc]" pytest pytest-cov
      # Coverage is informational (term-missing report); it does not gate the build.
      - name: Run unit tests
        run: pytest tests/ -q --cov=aidot_cameras --cov-report=term-missing
