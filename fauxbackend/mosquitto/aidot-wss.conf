# HA Mosquitto custom listener so the cameras' wss://{r}-mqtt.arnoo.com:8443/mqtt
# lands on HA's broker. Drop this into the Mosquitto add-on `customize` folder
# (set the add-on option `customize.active: true` and `customize.folder: mosquitto`,
# i.e. /share/mosquitto/aidot-wss.conf) and restart the add-on.
#
# Cameras connect with TLS + WebSocket on 8443, path /mqtt. They do NOT validate
# the cert, so the arnoo cert from certs/gen_certs.sh (or even the add-on's own LE
# cert) is accepted.

listener 8443
protocol websockets
# path is matched by the ws upgrade; AiDot uses /mqtt
http_dir
cafile /ssl/arnoo.crt
certfile /ssl/arnoo.crt
keyfile /ssl/arnoo.key
require_certificate false
tls_version tlsv1.2

# Auth: accept the creds app.py hands out (FAUX_MQTT_USER/PASS). Either add them
# to the broker's password_file, or for a closed LAN test allow anonymous.
# allow_anonymous true
