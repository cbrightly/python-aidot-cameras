# Standalone Mosquitto for the AiDot fleet (docker-compose service).
# Dedicated broker — keep it SEPARATE from HA's shared broker so a camera/topic
# issue can't take down Zigbee2MQTT/Govee.

# plain MQTT for the faux responder + bridge (LAN)
listener 1883
allow_anonymous true

# wss listener the cameras dial: {r}-mqtt.arnoo.com:8443/mqtt
listener 8443
protocol websockets
certfile /mosquitto/certs/arnoo.crt
keyfile /mosquitto/certs/arnoo.key
require_certificate false
tls_version tlsv1.2
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
# TODO: replace allow_anonymous with a password_file matching FAUX_MQTT_USER/PASS
# once validated on a closed LAN.
