# coturn config for the AiDot faux backend — our replacement for 3.230.182.123.
# Hand these creds out via app.py /v29/.../iceConfig AND mqtt_responder.py.
#
# Run: turnserver -c turnserver.conf
# (or the coturn HA add-on / docker image instyled/coturn)

listening-port=3478
# tls-listening-port=5349            # enable if you want turns: (camera used turn:udp)
fingerprint

# Long-term credentials — must match FAUX_TURN_USER / FAUX_TURN_PASS.
lt-cred-mech
user=aidot:aidot

realm=arnoo.com

# Bind to the host that cameras + bridge can reach (HA LAN IP by default).
# listening-ip=192.168.1.162
# For remote viewing the relay must be reachable from the public internet too;
# set external-ip to your WAN IP and forward 3478/udp+tcp if doing remote.
# external-ip=<WAN_IP>

# Relay range
min-port=49152
max-port=65535

# Quiet + safe defaults
no-cli
no-multicast-peers
# stale-nonce
verbose
